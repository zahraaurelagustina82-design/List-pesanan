<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pesanan - UMKM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-8 px-4">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <h1 class="text-3xl font-bold text-indigo-600 mb-6 text-center">Form Pesanan</h1>
            
            <div id="alert" class="hidden mb-4 p-4 rounded-lg"></div>
            
            <form id="orderForm" class="space-y-4">
                <div>
                    <label class="block text-gray-700 font-medium mb-2">Nama Pemesan *</label>
                    <input type="text" id="nama" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                </div>
                
                <div>
                    <label class="block text-gray-700 font-medium mb-2">No. HP Pemesan *</label>
                    <input type="tel" id="noHp" required pattern="[0-9]{10,}" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                        placeholder="Minimal 10 digit">
                </div>
                
                <div>
                    <label class="block text-gray-700 font-medium mb-2">Menu *</label>
                    <input type="text" id="menu" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                </div>
                
                <div>
                    <label class="block text-gray-700 font-medium mb-2">Tanggal Pengambilan *</label>
                    <input type="date" id="tanggal" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                </div>
                
                <div>
                    <label class="block text-gray-700 font-medium mb-2">Jam Pengambilan *</label>
                    <input type="time" id="jam" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                </div>
                
                <div>
                    <label class="block text-gray-700 font-medium mb-2">Keterangan</label>
                    <textarea id="keterangan" rows="3" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"></textarea>
                </div>
                
                <button type="submit" id="submitBtn"
                    class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition duration-200">
                    Kirim Pesanan
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <a href="admin.html" class="text-indigo-600 hover:underline">Lihat Data Pesanan</a>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
