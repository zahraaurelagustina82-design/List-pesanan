<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pesanan - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-8 px-4">
    <div class="max-w-7xl mx-auto">
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                <h1 class="text-3xl font-bold text-indigo-600">Data Pesanan</h1>
                <button id="refreshBtn" 
                    class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition duration-200">
                    Refresh Data
                </button>
            </div>
            
            <div id="alert" class="hidden mb-4 p-4 rounded-lg"></div>
            
            <div class="mb-4">
                <input type="text" id="searchInput" placeholder="Cari nama atau menu..." 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
            </div>
            
            <div class="mb-4 text-gray-700">
                Total Pesanan: <span id="totalOrders" class="font-bold text-indigo-600">0</span>
            </div>
            
            <div id="loading" class="text-center py-8 hidden">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
                <p class="mt-2 text-gray-600">Memuat data...</p>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full" id="orderTable">
                    <thead class="bg-indigo-600 text-white">
                        <tr>
                            <th class="px-4 py-3 text-left">No</th>
                            <th class="px-4 py-3 text-left">Nama</th>
                            <th class="px-4 py-3 text-left">No. HP</th>
                            <th class="px-4 py-3 text-left">Menu</th>
                            <th class="px-4 py-3 text-left">Tanggal</th>
                            <th class="px-4 py-3 text-left">Jam</th>
                            <th class="px-4 py-3 text-left">Keterangan</th>
                        </tr>
                    </thead>
                    <tbody id="orderTableBody" class="divide-y divide-gray-200">
                    </tbody>
                </table>
            </div>
            
            <div class="mt-6 text-center">
                <a href="index.html" class="text-indigo-600 hover:underline">Kembali ke Form Pesanan</a>
            </div>
        </div>
    </div>
    
    <script src="admin.js"></script>
</body>
</html>
